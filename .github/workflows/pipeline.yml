# This pipeline runs automatically when code is pushed to main
# or when a Pull Request is opened

name: DevMind-AI Pipeline

# ---------------------------------------------------------------------------
# Triggers — when does this pipeline run?
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main]        # runs when code pushed to main
  pull_request:
    branches: [main]        # runs when PR opened against main

jobs:
  # -------------------------------------------------------------------------
  # Job 1 — Test
  # Run pytest on our AI agent code
  # -------------------------------------------------------------------------
  test:
    name: Test AI Agent
    runs-on: ubuntu-latest   # GitHub provides a free Ubuntu machine

    steps:
      # Step 1 — Download our code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3 — Install our agent dependencies
      - name: Install dependencies
        run: |
          pip install -r agent/requirements.txt

      # Step 4 — Run tests
      # If tests fail → pipeline stops here, build never starts
      - name: Run tests
        run: |
          cd agent
          pytest tests/ -v
        continue-on-error: false   # fail pipeline if tests fail

  # -------------------------------------------------------------------------
  # Job 2 — Build
  # Build Docker image for our Flask app
  # Only runs after tests pass
  # -------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: test              # only runs if test job passes ✅
    if: github.ref == 'refs/heads/main'   # only on main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Generate a unique tag using the commit SHA
      # e.g. sha-a1b2c3d4
      - name: Generate image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # Set up Docker Buildx for better build performance
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry (GHCR)
      # This is where we store our Docker images
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the Docker image to GHCR
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/devmind-ai-app:${{ steps.tag.outputs.tag }}
          cache-from: type=gha    # cache layers for faster builds
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Job 3 — AI Review
  # Run our AI agent on any open PRs
  # Only runs on pull requests
  # -------------------------------------------------------------------------
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: test              # only runs if tests pass
    if: github.event_name == 'pull_request'   # only on PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: pip install -r agent/requirements.txt

      # Run our AI review agent
      # Uses GITHUB_TOKEN to post the review comment
      # Uses ANTHROPIC_API_KEY for cloud AI (fallback when no local Ollama)
      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLLAMA_URL: "http://localhost:11434"
        run: |
          python agent/review.py \
            --repo ${{ github.repository }} \
            --pr ${{ github.event.pull_request.number }} \
            --dry-run
